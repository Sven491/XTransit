# Docker-Compose voor Portainer (remote deployment)
# Images worden automatisch gebouwd via GitHub Actions en gehost in GitHub Container Registry (GHCR)

version: '3.9'

services:
  auth_api:
    # Images van GitHub Container Registry
    image: ghcr.io/Sven491/XTransit/auth_api:latest
    # Of specifieke tag (bijv. bij versioning):
    # image: ghcr.io/YOUR_USERNAME/YOUR_REPO/auth_api:v1.0.0
    container_name: auth_api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER_AUTH}
      DB_PASSWORD: ${POSTGRES_PASSWORD_AUTH}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Als je private registry gebruikt, voeg toe:
    # pull_policy: always

  employee_api:
    image: ghcr.io/YOUR_USERNAME/YOUR_REPO/employee_api:latest
    container_name: employee_api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER_EMPLOYEE}
      DB_PASSWORD: ${POSTGRES_PASSWORD_EMPLOYEE}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  transit_api:
    image: ghcr.io/YOUR_USERNAME/YOUR_REPO/transit_api:latest
    container_name: transit_api
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER_TRANSIT}
      DB_PASSWORD: ${POSTGRES_PASSWORD_TRANSIT}
    restart: unless-stopped
