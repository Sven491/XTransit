version: '3.9'

services:
  auth_api:
    image: ghcr.io/sven491/xtransit/auth_api:latest
    container_name: auth_api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_AUTH}
      PG_PASS: ${POSTGRES_PASSWORD_AUTH}
    restart: unless-stopped

  employee_api:
    image: ghcr.io/sven491/xtransit/employee_api:latest
    container_name: employee_api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_EMPLOYEE}
      PG_PASS: ${POSTGRES_PASSWORD_EMPLOYEE}
    restart: unless-stopped

  transit_api:
    image: ghcr.io/sven491/xtransit/transit_api:latest
    container_name: transit_api
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET}
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_TRANSIT}
      PG_PASS: ${POSTGRES_PASSWORD_TRANSIT}
    restart: unless-stopped