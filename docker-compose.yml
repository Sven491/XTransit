version: '3.9'
services:
  error_log_api:
    build:
      context: ./error_log_api
    container_name: error_log_api
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_LOGGER}
      PG_PASS: ${POSTGRES_PASSWORD_LOGGER}
      ERROR_LOG_API_URL: ${ERROR_LOG_API_URL}
    restart: unless-stopped

  auth_api:
    image: ghcr.io/sven491/xtransit/auth_api:latest
    container_name: auth_api
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_AUTH}
      PG_PASS: ${POSTGRES_PASSWORD_AUTH}
      ADMIN_USER_CODES: ${ADMIN_USER_CODES}
      DEV_BYPASS: ${DEV_BYPASS:-0}
      ERROR_LOG_API_URL: ${ERROR_LOG_API_URL}
    depends_on:
      - error_log_api
    restart: unless-stopped

  employee_api:
    image: ghcr.io/sven491/xtransit/employee_api:latest
    container_name: employee_api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_EMPLOYEE}
      PG_PASS: ${POSTGRES_PASSWORD_EMPLOYEE}
      ERROR_LOG_API_URL: ${ERROR_LOG_API_URL}
    depends_on:
      - error_log_api
    restart: unless-stopped

  transit_api:
    image: ghcr.io/sven491/xtransit/transit_api:latest
    container_name: transit_api
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET}
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER_TRANSIT}
      PG_PASS: ${POSTGRES_PASSWORD_TRANSIT}
      DEV_MOCK: ${DEV_MOCK:-0}
      ERROR_LOG_API_URL: ${ERROR_LOG_API_URL}
    depends_on:
      - error_log_api
    restart: unless-stopped

  admin_ui:
    image: ghcr.io/sven491/xtransit/admin_ui:latest
    container_name: admin_ui
    ports:
      - "5174:80"
    environment:
      AUTH_API: ${AUTH_API}
      TRANSIT_API: ${TRANSIT_API}
      ERROR_LOG_API: ${ERROR_LOG_API}
    depends_on:
      - auth_api
      - transit_api
      - error_log_api
    restart: unless-stopped